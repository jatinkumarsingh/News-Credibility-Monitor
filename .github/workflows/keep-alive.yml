name: Keep Render Alive

on:
  schedule:
    # Every 14 minutes — Render free tier sleeps after 15 min of inactivity
    - cron: "*/14 * * * *"
  workflow_dispatch: # Allow manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health-check
        run: |
          curl -fsS -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            https://news-credibility-monitor-api.onrender.com/
